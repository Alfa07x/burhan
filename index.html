<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث العملاء والفواتير</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --primary-50: #eff6ff;
            --primary-100: #dbeafe;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --body-bg: #f1f5f9;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        body {
            background: var(--body-bg);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* ===== Header ===== */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: #fff;
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            position: relative;
        }
        .header p {
            font-size: 0.9rem;
            color: #94a3b8;
            position: relative;
        }
        .header .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.2rem;
            position: relative;
        }
        .header .stat-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0.6rem 1.5rem;
            border-radius: 12px;
            text-align: center;
        }
        .stat-box .stat-num {
            font-size: 1.5rem;
            font-weight: 800;
            color: #60a5fa;
        }
        .stat-box .stat-lbl {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* ===== Search ===== */
        .search-container {
            max-width: 800px;
            margin: -1.5rem auto 1.5rem;
            padding: 0 1rem;
            position: relative;
            z-index: 10;
        }
        .search-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 1.2rem 1.5rem;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-card input {
            flex: 1;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem 0.8rem 0.8rem;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-card input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .search-card input::placeholder {
            color: #94a3b8;
        }
        .btn-search {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-search:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
        }
        .btn-search:active {
            transform: translateY(0);
        }
        .btn-reset {
            background: #f1f5f9;
            color: var(--text-muted);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .btn-reset:hover {
            background: #e2e8f0;
            color: var(--text-dark);
        }

        /* ===== Results Info ===== */
        .results-info {
            max-width: 1200px;
            margin: 0 auto 1rem;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .results-info span {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        .results-info .result-count {
            background: var(--primary-100);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* ===== Table ===== */
        .table-container {
            max-width: 1200px;
            margin: 0 auto 2rem;
            padding: 0 1rem;
        }
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            background: #f8fafc;
            padding: 0.9rem 1.2rem;
            text-align: right;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 5;
        }
        thead th:first-child {
            width: 60px;
            text-align: center;
        }
        tbody tr {
            transition: background 0.15s ease;
        }
        tbody tr:hover {
            background: var(--primary-50);
        }
        tbody td {
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        tbody td:first-child {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
        }
        .customer-name-cell {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-dark);
        }
        .customer-name-cell i {
            color: var(--primary);
            margin-left: 6px;
            font-size: 0.85rem;
        }
        .invoice-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .invoice-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.15s;
        }
        .invoice-chip i {
            font-size: 0.65rem;
            color: var(--primary);
        }
        .invoice-count {
            background: var(--primary-100);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 6px;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }
        .no-results p {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Highlight */
        .highlight {
            background: #fef08a;
            padding: 0 2px;
            border-radius: 3px;
        }

        /* Print */
        @media print {
            .header { padding: 1rem; }
            .header::before { display: none; }
            .search-container { display: none; }
            .results-info .btn-reset { display: none; }
            .table-wrapper { box-shadow: none; border: 1px solid #ccc; }
            tbody tr:hover { background: none; }
            .invoice-chip { border: 1px solid #ccc; background: #f9f9f9; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.3rem; }
            .header .stats { gap: 0.8rem; flex-wrap: wrap; }
            .stat-box { padding: 0.5rem 1rem; }
            .search-card { flex-direction: column; }
            .search-card input { width: 100%; }
            .btn-search { width: 100%; justify-content: center; }
            thead th, tbody td { padding: 0.5rem 0.6rem; font-size: 0.82rem; }
            .invoice-chip { font-size: 0.78rem; padding: 2px 6px; }
        }
    </style>
</head>

                ? 'نتائج البحث عن: "' + searchTerm + '"'
                : 'عرض جميع العملاء';

            let html = '';
            data.forEach((customer, idx) => {
                const name = searchTerm
                    ? highlightText(customer.name, searchTerm)
                    : customer.name;

                const chips = customer.invoices.map(inv => {
                    const invText = searchTerm
                        ? highlightText(String(inv), searchTerm)
                        : inv;
                    return '<span class="invoice-chip"><i class="fas fa-file-invoice"></i> ' + invText + '</span>';
                }).join('');

                html += '<tr>' +
                    '<td>' + (idx + 1) + '</td>' +
                    '<td class="customer-name-cell"><i class="fas fa-user-circle"></i>' + name +
                    '<span class="invoice-count">' + customer.invoices.length + '</span></td>' +
                    '<td><div class="invoice-chips">' + chips + '</div></td>' +
                    '</tr>';
            });

            tbody.innerHTML = html;
        }

        // ===== Highlight =====
        function highlightText(text, term) {
            if (!term) return text;
            const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\' + '$&');
            const regex = new RegExp('(' + escaped + ')', 'gi');
            return String(text).replace(regex, '<span class="highlight">$1</span>');
        }

        // ===== Search =====
        function doSearch() {
            const term = document.getElementById('searchInput').value.trim();
            if (!term) {
                renderTable(customers, '');
                return;
            }
            const filtered = customers.filter(c => {
                if (c.name.includes(term)) return true;
                return c.invoices.some(inv => String(inv).includes(term));
            });
            renderTable(filtered, term);
        }

        // ===== Reset =====
        function resetSearch() {
            document.getElementById('searchInput').value = '';
            renderTable(customers, '');
            document.getElementById('searchInput').focus();
        }

        // ===== Enter Key =====
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch();
            }
        });

        // ===== Initial Render =====
        renderTable(customers, '');
    </script>
</body>
</html>
